<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>和小崔聊天</title>
  <style>
    /* ===== 全局样式 ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f7f7f8;
      --bg-user-bubble: #007aff;
      --bg-ai-bubble: #f0f0f0;
      --text-primary: #1a1a1a;
      --text-secondary: #6e6e80;
      --text-user-bubble: #ffffff;
      --text-ai-bubble: #1a1a1a;
      --border-color: #e5e5e5;
      --shadow: 0 2px 6px rgba(0,0,0,0.08);
      --max-width: 800px;
      --radius: 18px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== 顶部标题栏 ===== */
    .header {
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-color);
      padding: 14px 20px;
      text-align: center;
      flex-shrink: 0;
    }
    .header h1 { font-size: 17px; font-weight: 600; }
    .header .subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    /* ===== 消息区域 ===== */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 10px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 欢迎提示 */
    .welcome {
      text-align: center;
      color: var(--text-secondary);
      padding: 40px 20px 10px;
    }
    .welcome .avatar {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 28px; margin: 0 auto 12px;
    }
    .welcome h2 { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
    .welcome p { font-size: 13px; line-height: 1.6; }

    /* 消息气泡 */
    .message {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .message.user { align-self: flex-end; }
    .message.ai { align-self: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.55;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .message.user .bubble {
      background: var(--bg-user-bubble);
      color: var(--text-user-bubble);
    }
    .message.ai .bubble {
      background: var(--bg-ai-bubble);
      color: var(--text-ai-bubble);
    }

    /* 时间戳 */
    .time {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 3px;
      padding: 0 4px;
    }
    .message.user .time { text-align: right; }

    /* 转圈 Loading */
    .typing-indicator {
      display: flex; align-items: center; gap: 6px;
      padding: 12px 16px;
      background: var(--bg-ai-bubble);
      border-radius: var(--radius);
      width: fit-content;
    }
    .typing-indicator span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #a0a0a0;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); }
      40% { transform: scale(1); }
    }

    /* 错误提示 */
    .error-bubble {
      background: #fff0f0 !important;
      color: #c0392b !important;
    }

    /* ===== 底部输入区域 ===== */
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border-color);
      background: var(--bg-primary);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 10px;
      max-width: var(--max-width);
      margin: 0 auto;
      align-items: flex-end;
    }
    .input-row textarea {
      flex: 1;
      resize: none;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 15px;
      font-family: inherit;
      line-height: 1.45;
      outline: none;
      max-height: 120px;
      transition: border-color 0.2s;
    }
    .input-row textarea:focus { border-color: #007aff; }

    .input-row button {
      flex-shrink: 0;
      width: 44px; height: 44px;
      border-radius: 50%;
      border: none;
      background: #007aff;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s, opacity 0.2s;
    }
    .input-row button:hover { background: #0056cc; }
    .input-row button:active { transform: scale(0.95); }
    .input-row button:disabled {
      background: #ccc;
      cursor: not-allowed;
      opacity: 0.6;
    }

    /* ===== 响应式：移动端 ===== */
    @media (max-width: 600px) {
      .message { max-width: 90%; }
      .header { padding: 10px 14px; }
      .chat-container { padding: 12px 10px 8px; gap: 10px; }
      .input-area { padding: 10px 10px; padding-bottom: max(10px, env(safe-area-inset-bottom)); }
    }

    /* ===== 滚动条美化 ===== */
    .chat-container::-webkit-scrollbar { width: 6px; }
    .chat-container::-webkit-scrollbar-thumb { background: #d0d0d0; border-radius: 3px; }
  </style>
</head>
<body>

  <!-- 顶部栏 -->
  <div class="header">
    <h1>小崔</h1>
    <div class="subtitle">19岁 · 计算机大一 · 陕科大</div>
  </div>

  <!-- 消息区域 -->
  <div class="chat-container" id="chatContainer">
    <div class="welcome" id="welcome">
      <div class="avatar">🌸</div>
      <h2>嘿 我是小崔</h2>
      <p>陕西科技大学计算机大一学生<br>想聊什么都可以 随便说就好</p>
    </div>
  </div>

  <!-- 输入区域 -->
  <div class="input-area">
    <div class="input-row">
      <textarea
        id="messageInput"
        rows="1"
        placeholder="发消息..."
        maxlength="4000"
      ></textarea>
      <button id="sendBtn" title="发送">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"></line>
          <polyline points="5 12 12 5 19 12"></polyline>
        </svg>
      </button>
    </div>
  </div>

  <script>
    (function() {
      const chatContainer = document.getElementById('chatContainer');
      const messageInput = document.getElementById('messageInput');
      const sendBtn = document.getElementById('sendBtn');
      const welcome = document.getElementById('welcome');

      let isLoading = false;
      let currentAiBubble = null;  // 当前正在追加的 AI 气泡

      // 自动调整输入框高度
      messageInput.addEventListener('input', () => {
        messageInput.style.height = 'auto';
        messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
      });

      // 回车发送（Shift+回车换行）
      messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      // 点击发送按钮
      sendBtn.addEventListener('click', sendMessage);

      // 滚动到底部
      function scrollToBottom() {
        requestAnimationFrame(() => {
          chatContainer.scrollTop = chatContainer.scrollHeight;
        });
      }

      // 生成时间字符串
      function timeString() {
        const now = new Date();
        return now.getHours().toString().padStart(2, '0') + ':' +
               now.getMinutes().toString().padStart(2, '0');
      }

      // 添加一条消息气泡到界面
      function addMessageBubble(role, content) {
        welcome.style.display = 'none';

        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerHTML = `
          <div class="bubble">${escapeHtml(content)}</div>
          <div class="time">${timeString()}</div>
        `;
        chatContainer.appendChild(div);
        scrollToBottom();
        return div;
      }

      // HTML 转义
      function escapeHtml(text) {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
        return text.replace(/[&<>"']/g, c => map[c]);
      }

      // 设置 loading 状态
      function setLoading(loading) {
        isLoading = loading;
        sendBtn.disabled = loading;
        messageInput.disabled = loading;
        if (loading) {
          messageInput.placeholder = '小崔正在思考...';
        } else {
          messageInput.placeholder = '发消息...';
          messageInput.focus();
        }
      }

      // 显示打字动画（三个小圆点）
      function showTypingIndicator() {
        const div = document.createElement('div');
        div.className = 'message ai';
        div.id = 'typingIndicator';
        div.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
        chatContainer.appendChild(div);
        scrollToBottom();
      }

      // 隐藏打字动画
      function hideTypingIndicator() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
      }

      // 创建/获取当前 AI 输出气泡
      function getOrCreateAiBubble() {
        if (!currentAiBubble) {
          welcome.style.display = 'none';
          hideTypingIndicator();

          const div = document.createElement('div');
          div.className = 'message ai';
          div.innerHTML = `<div class="bubble"></div><div class="time">${timeString()}</div>`;
          chatContainer.appendChild(div);
          currentAiBubble = div;
          scrollToBottom();
        }
        return currentAiBubble;
      }

      // 追加文字到 AI 气泡
      function appendAiText(text) {
        const bubble = getOrCreateAiBubble().querySelector('.bubble');
        bubble.textContent += text;
        scrollToBottom();
      }

      // 发送消息
      async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text || isLoading) return;

        // 显示用户消息
        addMessageBubble('user', text);
        messageInput.value = '';
        messageInput.style.height = 'auto';

        // 进入 loading 状态
        setLoading(true);
        showTypingIndicator();
        currentAiBubble = null;

        try {
          const response = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text }),
          });

          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            throw new Error(errData.error || `请求失败 (${response.status})`);
          }

          // 读取 SSE 流
          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';
          let hasContent = false;

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              const data = line.slice(6).trim();
              if (data === '[DONE]') continue;

              try {
                const parsed = JSON.parse(data);

                // 服务端发来的错误
                if (parsed.error) {
                  hideTypingIndicator();
                  if (currentAiBubble) currentAiBubble.remove();
                  currentAiBubble = null;
                  showErrorBubble(parsed.error);
                  return;
                }

                // DeepSeek 的流式格式：choices[0].delta.content
                const content = parsed.choices?.[0]?.delta?.content;
                if (content) {
                  hasContent = true;
                  appendAiText(content);
                }
              } catch (_) {
                // 非 JSON 行，跳过
              }
            }
          }

          // 如果没有收到任何内容
          if (!hasContent) {
            hideTypingIndicator();
            if (currentAiBubble) {
              currentAiBubble.querySelector('.bubble').textContent = '（小崔沉默了...）';
            } else {
              addMessageBubble('ai', '（小崔不知道说什么了）');
            }
            currentAiBubble = null;
          } else {
            // 标记完成
            if (currentAiBubble) {
              currentAiBubble.dataset.done = 'true';
            }
            currentAiBubble = null;
          }

        } catch (error) {
          hideTypingIndicator();
          if (currentAiBubble) {
            currentAiBubble.remove();
            currentAiBubble = null;
          }

          let errMsg = '连接失败，请检查网络后重试';
          if (error.message) errMsg = error.message;
          showErrorBubble(errMsg);
        } finally {
          setLoading(false);
        }
      }

      // 显示错误气泡
      function showErrorBubble(msg) {
        const div = document.createElement('div');
        div.className = 'message ai';
        div.innerHTML = `<div class="bubble error-bubble">${escapeHtml(msg)}</div><div class="time">${timeString()}</div>`;
        chatContainer.appendChild(div);
        scrollToBottom();
      }

      // 初始聚焦
      messageInput.focus();
    })();
  </script>
</body>
</html>
